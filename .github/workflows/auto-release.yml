name: Conventional Commit Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    name: Create Release from Conventional Commits
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Previous Tag
        id: prev-tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Generate Conventional Release Notes
        id: notes
        run: |
          PREV_TAG="${{ steps.prev-tag.outputs.prev_tag }}"
          
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges ${PREV_TAG}..HEAD)
          fi
          
          # Parse conventional commits
          FEATURES=""
          FIXES=""
          DOCS=""
          OTHERS=""
          
          while IFS= read -r commit; do
            if [[ "$commit" =~ ^feat(\([^)]*\))?!?: ]]; then
              FEATURES="${FEATURES}- 🎉 ${commit}\n"
            elif [[ "$commit" =~ ^feat(\([^)]*\))?: ]]; then
              FEATURES="${FEATURES}- ✨ ${commit}\n"
            elif [[ "$commit" =~ ^fix(\([^)]*\))?!?: ]]; then
              FIXES="${FIXES}- 🐛 ${commit}\n"
            elif [[ "$commit" =~ ^fix(\([^)]*\))?: ]]; then
              FIXES="${FIXES}- 🔧 ${commit}\n"
            elif [[ "$commit" =~ ^docs(\([^)]*\))?!?: ]]; then
              DOCS="${DOCS}- 📝 ${commit}\n"
            elif [[ "$commit" =~ ^docs(\([^)]*\))?: ]]; then
              DOCS="${DOCS}- 📚 ${commit}\n"
            else
              OTHERS="${OTHERS}- ${commit}\n"
            fi
          done <<< "$COMMITS"
          
          # Build release notes
          NOTES="## 🚀 Release ${{ github.ref_name }}\n\n"
          
          if [ -n "$FEATURES" ]; then
            NOTES="${NOTES}### ✨ Features\n${FEATURES}\n"
          fi
          
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}### 🐛 Fixes\n${FIXES}\n"
          fi
          
          if [ -n "$DOCS" ]; then
            NOTES="${NOTES}### 📚 Documentation\n${DOCS}\n"
          fi
          
          if [ -n "$OTHERS" ]; then
            NOTES="${NOTES}### 🔧 Other Changes\n${OTHERS}\n"
          fi
          
          NOTES="${NOTES}\n---\n\n*Auto-generated from conventional commits*"
          
          echo -e "$NOTES" > release-notes.txt
          echo "Generated conventional release notes"
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ github.ref_name }}
          body_path: release-notes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
